    <meta charset="UTF-8" />

    <title>ForgeOne Desktop</title>
    <script>
      if (!window.forgeone) {
        window.forgeone = {
          listTraces: async () => [
            { session_id: 'session-2026-06-14-01', task_input: 'Write a quicksort in Rust', status: 'completed', loop_index: 3, stop_reason: 'final_response', approval_required: false },
            { session_id: 'session-2026-06-14-02', task_input: 'Read sensitive config keys', status: 'waiting_approval', loop_index: 1, stop_reason: 'approval_required', approval_required: true }
          ],
          inspectTrace: async (id) => ({
            session_id: id,
            task_id: 'task-123',
            task_input: id === 'session-2026-06-14-01' ? 'Write a quicksort in Rust' : 'Read sensitive config keys',
            agent_id: 'agent-root',
            status: id === 'session-2026-06-14-01' ? 'completed' : 'waiting_approval',
            current_phase: id === 'session-2026-06-14-01' ? 'finalize' : 'tool_decision',
            loop_index: id === 'session-2026-06-14-01' ? 3 : 1,
            stop_reason: id === 'session-2026-06-14-01' ? 'final_response' : 'approval_required',
            final_response: id === 'session-2026-06-14-01' ? 'Here is the quicksort implementation in Rust:\n\n```rust\nfn quicksort<T: Ord>(arr: &mut [T]) {\n    if arr.len() <= 1 { return; }\n    let pivot = partition(arr);\n    quicksort(&mut arr[0..pivot]);\n    quicksort(&mut arr[pivot + 1..]);\n}\n```' : '',
            tokens_estimate: 1250,
            tool_call_count: 2,
            pending_approval: id === 'session-2026-06-14-01' ? null : {
              tool_name: 'read_file',
              reason: 'Accessing config under sensitive folder secrets/',
              argument_summary: 'path=secrets/db.env'
            },
            trace: [
              { timestamp_ms: Date.now() - 60000, session_id: id, agent_id: 'agent-root', parent_agent_id: null, loop_index: 0, kind: 'TaskReceived', message: 'task accepted' },
              { timestamp_ms: Date.now() - 50000, session_id: id, agent_id: 'agent-root', parent_agent_id: null, loop_index: 1, kind: 'LoopStarted', message: 'agent loop started' },
              { timestamp_ms: Date.now() - 40000, session_id: id, agent_id: 'agent-root', parent_agent_id: null, loop_index: 1, kind: 'ContextBuilt', message: 'context built successfully' },
              { timestamp_ms: Date.now() - 30000, session_id: id, agent_id: 'agent-root', parent_agent_id: null, loop_index: 1, kind: 'ModelRequested', message: 'sent request to gpt-4o' }
            ]
          }),
          runTask: async (params) => {
            return {
              state: {
                session_id: 'session-new-temp',
                task_id: 'task-new',
                agent_id: 'agent-root',
                parent_agent_id: null,
                loop_index: 1,
                status: 'waiting_approval',
                current_phase: 'tool_decision',
                observations: [],
                policy_decisions: [],
                pending_approval: {
                  tool_name: 'write_file',
                  reason: 'Editing protected README.md',
                  argument_summary: 'path=README.md'
                },
                budget_usage: { tokens_estimate: 512, tool_call_count: 1 },
                stop_reason: 'approval_required'
              },
              final_response: '',
              trace: [
                { timestamp_ms: Date.now(), session_id: 'session-new-temp', agent_id: 'agent-root', parent_agent_id: null, loop_index: 1, kind: 'ToolRequested', message: 'tool call write_file requested' }
              ]
            };
          },
          prunePending: async () => {},
          approveSession: async () => {
            return {
              state: {
                session_id: 'session-new-temp',
                task_id: 'task-new',
                agent_id: 'agent-root',
                parent_agent_id: null,
                loop_index: 2,
                status: 'completed',
                current_phase: 'finalize',
                observations: [],
                policy_decisions: [],
                pending_approval: null,
                budget_usage: { tokens_estimate: 1024, tool_call_count: 2 },
                stop_reason: 'final_response'
              },
              final_response: 'Successfully edited the file README.md!',
              trace: [
                { timestamp_ms: Date.now(), session_id: 'session-new-temp', agent_id: 'agent-root', parent_agent_id: null, loop_index: 2, kind: 'ToolCompleted', message: 'tool call write_file completed successfully' },
                { timestamp_ms: Date.now() + 100, session_id: 'session-new-temp', agent_id: 'agent-root', parent_agent_id: null, loop_index: 2, kind: 'SessionStopped', message: 'session stopped with final response' }
              ]
            };
          }
        };
      }
    </script>
