name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt

      - name: Build
        run: cargo build --all-targets --verbose

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --verbose

  package:
    runs-on: windows-latest
    needs: [check]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build Rust backend (release)
        run: cargo build --release -p forgeone-server --verbose

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/forgeone-desktop/package-lock.json

      - name: Install npm dependencies
        run: npm ci
        working-directory: apps/forgeone-desktop

      - name: Build Electron app + package
        run: npm run dist:win
        working-directory: apps/forgeone-desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: forgeone-windows-installer
          path: apps/forgeone-desktop/release/*.exe
